# CI for KENT_AI_Service — Docker image build (deploy focus; pytest can return later).
name: API

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: docker build
        run: docker build -t kent-ai-service:ci .
