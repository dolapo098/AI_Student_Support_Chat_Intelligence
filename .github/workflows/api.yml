# CI — Docker build (Dockerfile runs build_knowledge_base.py before COPY app, so the image includes RAG).
# Same image Railway builds from your repo, so production gets index.faiss + chunks.pkl without git-ignoring fixes.
name: API

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  docker:
    name: Docker build (includes knowledge base)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - name: docker build
        run: docker build -t kent-ai-service:ci .
